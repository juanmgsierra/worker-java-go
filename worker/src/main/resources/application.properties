spring.application.name=worker
server.port=8088

spring.data.mongodb.uri=mongodb://admin:jmgsTest@localhost:27017/company?authSource=admin

url.client.api=http://localhost:8000/api/v1


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=my-company
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.listener.ack-mode=manual
# logging.level.org.springframework.kafka=DEBUG

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.jmgs.worker.dto.OrderEvent

spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.redis.password=password # Optional
spring.data.redis.database=0