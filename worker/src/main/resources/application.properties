spring.application.name=worker

spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=company
spring.mongodb.username=admin
spring.mongodb.password=jmgsTest

url.client.api=http://localhost:8000/api/v1


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=my-company
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# logging.level.org.springframework.kafka=DEBUG

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.jmgs.worker.dto.OrderEvent

spring.redis.host=localhost
spring.redis.port=6379
# spring.redis.password=password # Optional
spring.redis.database=company